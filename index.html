<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluna - Gestión de Floristería</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="top-bar">
        <div class="brand">SOLUNA</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="window.openTab('ventas')">Vender Ramos</button>
        <button class="tab-btn" onclick="window.openTab('otros')">Vender Extras</button>
        <button class="tab-btn" onclick="window.openTab('gastos')">Salidas (Dinero)</button>
        <button class="tab-btn" onclick="window.openTab('inventario')">Inventario</button>
        <button class="tab-btn" onclick="window.openTab('balance')">Balance y Reportes</button>
    </nav>

    <div class="container">
        <!-- VENTA DE RAMOS -->
        <div id="ventas" class="tab-content active">
            <div class="card">
                <h2>Vender Ramos</h2>
                <div id="gridRamos" class="grid-ramos"></div>
                <div id="confirmacionVenta" class="confirm-box" style="display: none;">
                    <h3 id="tituloRamoSeleccionado">Ramo</h3>
                    <input type="number" id="cantEfectivo" placeholder="Efectivo $">
                    <input type="number" id="cantBanco" placeholder="Banco $">
                    <button class="btn-main" onclick="window.confirmarVenta()">Confirmar</button>
                    <button onclick="window.cancelarVenta()">Cancelar</button>
                </div>
            </div>
        </div>

        <!-- SALIDAS Y GASTOS (LÓGICA COMPLETA) -->
        <div id="gastos" class="tab-content">
            <div class="card">
                <h2>Registrar Salida</h2>
                
                <div class="gasto-section">
                    <h3>Inversión: Flores en Lote</h3>
                    <input type="text" id="descGeneralFlores" placeholder="Descripción lote">
                    <input type="number" id="costoGeneralFlores" placeholder="Costo Total $">
                    <select id="cuentaGeneralFlores"><option value="efectivo">Efectivo</option><option value="banco">Banco</option></select>
                    <button onclick="window.registrarGasto('flor_general')">Registrar Lote</button>
                </div>

                <div class="gasto-section">
                    <h3>Inversión: Flor Específica</h3>
                    <div style="display:flex; gap:5px;">
                        <select id="selectFlores" style="flex:1;"></select>
                        <button onclick="window.nuevoTipoFlor()">+ Nueva</button>
                    </div>
                    <input type="text" id="cantGastoFlor" placeholder="Cant. (Ej: 2 docenas)">
                    <input type="number" id="costoGastoFlor" placeholder="Costo $">
                    <select id="cuentaGastoFlor"><option value="efectivo">Efectivo</option><option value="banco">Banco</option></select>
                    <button onclick="window.registrarGasto('flor_especifica')">Registrar Flor</button>
                </div>

                <div class="gasto-section">
                    <h3>Inversión: Nuevo Stock (Tazas, Globos)</h3>
                    <input type="text" id="nombreNuevoInv" placeholder="Nombre producto">
                    <input type="number" id="cantNuevoInv" placeholder="Cantidad">
                    <input type="number" id="costoNuevoInv" placeholder="Costo total $">
                    <select id="cuentaNuevoInv"><option value="efectivo">Efectivo</option><option value="banco">Banco</option></select>
                    <button onclick="window.registrarGasto('nuevo_producto')">Registrar Stock</button>
                </div>

                <div class="gasto-section">
                    <h3>Gasto Vario</h3>
                    <input type="text" id="descVario" placeholder="Luz, local, comida...">
                    <input type="number" id="costoVario" placeholder="Costo $">
                    <select id="cuentaVario"><option value="efectivo">Efectivo</option><option value="banco">Banco</option></select>
                    <button onclick="window.registrarGasto('gasto_vario')">Registrar Gasto</button>
                </div>
            </div>
        </div>

        <!-- INVENTARIO -->
        <div id="inventario" class="tab-content">
            <div class="card">
                <h2>Inventario de Extras</h2>
                <table>
                    <thead><tr><th>Producto</th><th>Stock</th><th>Acción</th></tr></thead>
                    <tbody id="listaInventario"></tbody>
                </table>
            </div>
        </div>

        <!-- VENDER EXTRAS -->
        <div id="otros" class="tab-content">
            <div class="card">
                <h2>Venta de Extras</h2>
                <select id="selectVenderInventario"></select>
                <input type="number" id="cantVenderOtro" placeholder="Cantidad">
                <input type="number" id="precioVenderOtro" placeholder="Precio Venta $">
                <select id="metodoOtro"><option value="efectivo">Efectivo</option><option value="banco">Banco</option></select>
                <button class="btn-main" onclick="window.venderInventario()">Confirmar Venta</button>
            </div>
        </div>

        <!-- BALANCE -->
        <div id="balance" class="tab-content">
            <div class="card">
                <select id="filtroTiempo" onchange="window.render()"><option value="hoy">Hoy</option><option value="todo">Todo el tiempo</option></select>
                <div class="bal-resumen">
                    <div>Ventas: <b id="venPeriodo">$0</b></div>
                    <div>Inversión: <b id="invPeriodo">$0</b></div>
                    <div>Gastos: <b id="gasPeriodo">$0</b></div>
                </div>
                <h3>Caja Actual</h3>
                <p>Efe: <b id="balEfectivo">$0</b> | Ban: <b id="balBanco">$0</b></p>
                <button style="background:red; color:white" onclick="window.resetearSistema()">RESET TOTAL</button>
                <div id="listaHistorial"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
