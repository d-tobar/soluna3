<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluna - Control de Floristería</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="top-bar">
        <div class="brand">Soluna</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="window.openTab('ventas')">Vender Ramos</button>
        <button class="tab-btn" onclick="window.openTab('otros')">Vender Extras</button>
        <button class="tab-btn" onclick="window.openTab('gastos')">Salidas (Dinero)</button>
        <button class="tab-btn" onclick="window.openTab('inventario')">Inventario</button>
        <button class="tab-btn" onclick="window.openTab('balance')">Balance y Reportes</button>
    </nav>

    <div class="container">
        <!-- SECCIÓN VENTAS -->
        <div id="ventas" class="tab-content active">
            <div class="card">
                <h2>Vender Ramos</h2>
                <div id="gridRamos" class="grid-ramos"></div>
                <div id="confirmacionVenta" class="confirm-box" style="display: none; flex-direction: column; gap: 10px;">
                    <h3 id="tituloRamoSeleccionado">Ramo de $0</h3>
                    <div style="display: flex; gap: 10px;">
                        <input type="number" id="cantEfectivo" placeholder="Efe $" value="0" style="width: 70px;">
                        <input type="number" id="cantBanco" placeholder="Ban $" value="0" style="width: 70px;">
                        <button class="btn-main" onclick="window.confirmarVenta()">OK</button>
                        <button onclick="window.cancelarVenta()">X</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- SECCIÓN SALIDAS (Donde fallaban los botones en image_da5fbe.png) -->
        <div id="gastos" class="tab-content">
            <div class="card">
                <h2>Registrar Salida de Dinero</h2>
                
                <div class="gasto-box" style="border-left: 4px solid #f39c12; padding: 10px; margin-bottom: 10px;">
                    <h3>Inversión: Flores o Mercancía</h3>
                    <input type="text" id="descInversion" placeholder="¿Qué compraste?">
                    <input type="number" id="montoInversion" placeholder="Monto $">
                    <select id="cuentaInversion">
                        <option value="efectivo">Efectivo</option>
                        <option value="banco">Banco</option>
                    </select>
                    <button class="btn-main" onclick="window.registrarSalida('INVERSIÓN')">Registrar Compra</button>
                </div>

                <div class="gasto-box" style="border-left: 4px solid #e74c3c; padding: 10px;">
                    <h3>Gasto Operativo (Luz, Alquiler, etc.)</h3>
                    <input type="text" id="descGasto" placeholder="Descripción del gasto">
                    <input type="number" id="montoGasto" placeholder="Monto $">
                    <select id="cuentaGasto">
                        <option value="efectivo">Efectivo</option>
                        <option value="banco">Banco</option>
                    </select>
                    <button class="btn-main" style="background:#e74c3c" onclick="window.registrarSalida('GASTO')">Registrar Gasto</button>
                </div>
            </div>
        </div>

        <!-- SECCIÓN BALANCE -->
        <div id="balance" class="tab-content">
            <div class="card">
                <h3>Balance Actual</h3>
                <p>Efectivo: <b id="balEfectivo">$0</b></p>
                <p>Banco: <b id="balBanco">$0</b></p>
                <hr>
                <h4>Movimientos</h4>
                <div id="listaHistorial" style="font-size: 0.8em; max-height: 200px; overflow-y: auto;"></div>
            </div>
        </div>
        
        <!-- SECCIÓN INVENTARIO -->
        <div id="inventario" class="tab-content">
            <div class="card">
                <h2>Inventario</h2>
                <div id="listaInventario"></div>
            </div>
        </div>

        <div id="otros" class="tab-content">
             <div class="card"><h2>Extras</h2><p>Próximamente...</p></div>
        </div>
    </div>

    <!-- Script al final para que el HTML cargue primero -->
    <script src="app.js"></script>
</body>
</html>
