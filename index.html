<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluna - Control de Floristería</title>
    <link rel="stylesheet" href="style.css">
    <!-- Carga de Supabase primero -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header class="top-bar">
        <div class="brand">Soluna</div>
    </header>

    <nav class="tabs">
        <button class="tab-btn active" onclick="window.openTab('ventas')">Vender Ramos</button>
        <button class="tab-btn" onclick="window.openTab('otros')">Vender Extras</button>
        <button class="tab-btn" onclick="window.openTab('gastos')">Salidas (Dinero)</button>
        <button class="tab-btn" onclick="window.openTab('inventario')">Inventario</button>
        <button class="tab-btn" onclick="window.openTab('balance')">Balance y Reportes</button>
    </nav>

    <div class="container">
        <!-- PESTAÑA VENTAS RAMOS -->
        <div id="ventas" class="tab-content active">
            <div class="card">
                <h2>Vender Ramos</h2>
                <div id="gridRamos" class="grid-ramos"></div>
                
                <div id="confirmacionVenta" class="confirm-box" style="display: none; flex-direction: column; gap: 10px;">
                    <h3 id="tituloRamoSeleccionado">Ramo de $0</h3>
                    <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: flex-end;">
                        <div>
                            <label>Efectivo:</label><br>
                            <input type="number" id="cantEfectivo" value="0" style="width: 80px;">
                        </div>
                        <div>
                            <label>Banco:</label><br>
                            <input type="number" id="cantBanco" value="0" style="width: 80px;">
                        </div>
                        <button class="btn-main" onclick="window.confirmarVenta()">Registrar</button>
                        <button class="btn-small" style="background:#95a5a6" onclick="window.cancelarVenta()">Cancelar</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- PESTAÑA OTROS (EXTRAS) -->
        <div id="otros" class="tab-content">
            <div class="card">
                <h2>Venta de Artículos Extras</h2>
                <div class="confirm-box">
                    <label>Producto:</label>
                    <select id="selectVenderInventario" style="width: 100%;"></select>
                    <div style="display: flex; gap: 10px; margin-top: 10px;">
                        <input type="number" id="cantVenderOtro" placeholder="Cant" value="1" style="width: 30%;">
                        <input type="number" id="precioVenderOtro" placeholder="Precio Total $" style="width: 70%;">
                    </div>
                    <select id="metodoOtro" style="width: 100%; margin-top:10px;">
                        <option value="efectivo">Efectivo</option>
                        <option value="banco">Banco</option>
                    </select>
                    <button class="btn-main" style="width: 100%; margin-top:10px;" onclick="window.venderInventario()">Registrar Venta</button>
                </div>
            </div>
        </div>

        <!-- PESTAÑA SALIDAS -->
        <div id="gastos" class="tab-content">
            <div class="card">
                <h2>Registrar Salida de Dinero</h2>
                <div class="gasto-box" style="border-left: 5px solid #f39c12; padding: 10px; margin-bottom: 10px;">
                    <h3>Nueva Inversión / Gasto</h3>
                    <input type="text" id="descGasto" placeholder="Descripción (Ej: Tazas o Flores)">
                    <input type="number" id="montoGasto" placeholder="Monto $">
                    <select id="cuentaGasto">
                        <option value="efectivo">Efectivo</option>
                        <option value="banco">Banco</option>
                    </select>
                    <button class="btn-main" onclick="window.registrarGastoRapido()">Registrar Salida</button>
                </div>
            </div>
        </div>

        <!-- PESTAÑA INVENTARIO -->
        <div id="inventario" class="tab-content">
            <div class="card">
                <h2>Existencias</h2>
                <table>
                    <thead><tr><th>Producto</th><th>Stock</th><th>Acción</th></tr></thead>
                    <tbody id="listaInventario"></tbody>
                </table>
            </div>
        </div>

        <!-- PESTAÑA BALANCE -->
        <div id="balance" class="tab-content">
            <div class="card">
                <div class="balance-grid">
                    <div class="bal-item">Efectivo: <b id="balEfectivo">$0</b></div>
                    <div class="bal-item">Banco: <b id="balBanco">$0</b></div>
                </div>
                <hr>
                <div id="listaHistorial" style="font-size: 0.9em; max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <!-- El script al final es CLAVE -->
    <script src="app.js"></script>
</body>
</html>
